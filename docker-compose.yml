services:
  spotops:
    build: .
    restart: unless-stopped
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - /srv/spotops/db:/srv/spotops/db
      - /srv/spotops/processed:/srv/spotops/processed
      - /srv/spotops/data:/app/data
      - /var/run/tailscale/tailscaled.sock:/var/run/tailscale/tailscaled.sock
    env_file:
      - .env
